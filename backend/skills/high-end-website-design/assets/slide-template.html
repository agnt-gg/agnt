<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>{{TITLE}}</title>

<!-- TYPOGRAPHY: replace with actual fonts per aesthetic -->
<!-- Examples: Bespoke Serif + JetBrains Mono | Cormorant Garamond | Syne + Space Mono -->
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,wght@0,300;0,600;1,300&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">

<style>
/* === RESET === */
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%;overflow:hidden}

/* === DESIGN TOKENS — replace per aesthetic === */
:root{
  --bg: #0a0a0a;
  --text: #f5f1ea;
  --accent: #ff3d68;
  --muted: #a5a29b;
  --border: #2a2a2a;
  --display: 'Fraunces', serif;
  --mono: 'JetBrains Mono', monospace;
  --body: 'Fraunces', serif;
}

body{
  background: var(--bg);
  color: var(--text);
  font-family: var(--body);
  -webkit-font-smoothing: antialiased;
}

/* === SLIDE WRAPPER — viewport-fit, never scrolls === */
.slide{
  position:relative;
  width:100vw;
  height:100vh;
  height:100dvh;
  overflow:hidden;
}

/* === HERO VIDEO LAYER === */
.bg{position:absolute;inset:0;z-index:0}
.bg video{
  width:100%; height:100%;
  object-fit:cover;
  display:block;
}
.bg::after{
  content:''; position:absolute; inset:0; z-index:1;
  background: radial-gradient(ellipse at 50% 55%, transparent 20%, rgba(10,10,10,.7) 100%);
}

/* === CONTENT LAYER === */
.content{
  position:relative; z-index:2;
  height:100%;
  display:flex; flex-direction:column;
  justify-content:space-between;
  padding: clamp(24px, 4vw, 64px);
}

/* === TYPOGRAPHY — base-2 sizes only === */
.eyebrow{
  font-family:var(--mono);
  font-size: clamp(10px, 0.75vw, 12px);
  letter-spacing:.25em;
  text-transform:uppercase;
  color: var(--accent);
  opacity:0;
  animation: fadeUp 1s .2s forwards;
}

h1{
  font-family: var(--display);
  font-weight: 300;
  font-size: clamp(56px, 9vw, 164px);
  line-height: .88;
  letter-spacing: -.03em;
  margin-top: clamp(24px, 3vw, 48px);
}
h1 span{
  display:block;
  opacity:0; transform: translateY(30px);
  animation: fadeUp 1.1s forwards;
}
h1 span:nth-child(1){ animation-delay: .35s }
h1 span:nth-child(2){ animation-delay: .55s }
h1 span:nth-child(3){ animation-delay: .75s }
h1 em{ font-style: italic; color: var(--accent) }

.lede{
  font-family: var(--body);
  font-size: clamp(14px, 1.1vw, 17px);
  line-height: 1.55;
  color: var(--muted);
  max-width: 540px;
  margin-top: clamp(20px, 2vw, 32px);
  opacity:0;
  animation: fadeUp 1s 1s forwards;
}

/* === HEADER / FOOTER META === */
.bar{
  display:flex; justify-content:space-between; align-items:center;
  font-family: var(--mono);
  font-size: clamp(10px, 0.75vw, 12px);
  letter-spacing:.18em;
  text-transform:uppercase;
  color: var(--muted);
}
.bar .dot{
  display:inline-block; width:6px; height:6px;
  border-radius:50%; background: var(--accent);
  margin-right:8px; animation: pulse 1.8s infinite;
}

/* === ANIMATIONS === */
@keyframes fadeUp{ to{ opacity:1; transform:translateY(0) } }
@keyframes pulse{ 0%,100%{ opacity:1 } 50%{ opacity:.3 } }

/* === ACCESSIBILITY (non-negotiable) === */
@media (prefers-reduced-motion: reduce){
  *{ animation: none !important; transition: none !important }
}
</style>
</head>
<body>
<section class="slide">

  <!-- HERO VIDEO — autoplay muted loop playsinline + poster fallback -->
  <div class="bg">
    <video autoplay muted loop playsinline poster="../images/{{SLUG}}.jpg">
      <source src="../videos/{{SLUG}}.mp4" type="video/mp4">
    </video>
  </div>

  <!-- CONTENT -->
  <div class="content">
    <header class="bar">
      <div><span class="dot"></span>{{STATUS}}</div>
      <div>{{META_CENTER}}</div>
      <div>{{META_RIGHT}}</div>
    </header>

    <main>
      <div class="eyebrow">{{EYEBROW}}</div>
      <h1>
        <span>{{LINE_1}}</span>
        <span><em>{{LINE_2}}</em></span>
        <span>{{LINE_3}}</span>
      </h1>
      <p class="lede">{{LEDE_COPY}}</p>
    </main>

    <footer class="bar">
      <div>{{FOOTER_LEFT}}</div>
      <div>{{FOOTER_CENTER}}</div>
      <div>{{FOOTER_RIGHT}}</div>
    </footer>
  </div>

</section>
</body>
</html>
